font: "JetBrainsMono Nerd Font 14"
background: "#030305"
color: "#F5F5F5"
border: "#DE3354"
corner_r: 0
padding: 15
rows_per_column: 5
column_padding: 25

inhibit_compositor_keyboard_shortcuts: true

menu:
  - key: 'p'
    desc: "Power off"
    cmd: "systemctl poweroff"
  - key: 'r'
    desc: "Reboot"
    cmd: "systemctl reboot"
  - key: 'e'
    desc: "Log out"
    cmd: "sh ~/scripts/logout.sh"
  - key: 'l'
    desc: "Lock session"
    cmd: "loginctl lock-session"
  - key: 's'
    desc: "Suspend"
    cmd: "systemctl suspend"
